site_name: mcp-loci
site_description: SQLite-backed persistent memory server for Claude — keyword + semantic search via MCP
site_url: https://underratedf00l.github.io/MCP-Loci
repo_url: https://github.com/underratedf00l/MCP-Loci
repo_name: underratedf00l/MCP-Loci

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            show_root_heading: true

nav:
  - Home: index.md
  - Spec Sheet: spec.md
  - API Reference:
    - Tools: api/tools.md
    - Database: api/db.md
    - Embeddings: api/embeddings.md
    - Confidence: api/confidence.md
  - Development:
    - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
